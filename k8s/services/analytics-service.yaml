apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: analytics-data
  namespace: helep
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: helep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
      - name: analytics-service
        image: carlos15976/helep-analytics-service:latest
        ports:
        - containerPort: 8005
        env:
        - name: KAFKA_BOOTSTRAP
          value: kafka:9092
        - name: DB_PATH
          value: /data/analytics.db
        - name: SERVICE_PORT
          value: "8005"
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: analytics-data
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: helep
spec:
  selector:
    app: analytics-service
  ports:
  - port: 8005
    targetPort: 8005
  type: ClusterIP
