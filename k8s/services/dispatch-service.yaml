apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dispatch-data
  namespace: helep
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatch-service
  namespace: helep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dispatch-service
  template:
    metadata:
      labels:
        app: dispatch-service
    spec:
      containers:
      - name: dispatch-service
        image: carlos15976/helep-dispatch-service:latest
        ports:
        - containerPort: 8003
        env:
        - name: KAFKA_BOOTSTRAP
          value: kafka:9092
        - name: DB_PATH
          value: /data/dispatch.db
        - name: MATCHER
          value: nearest
        - name: SERVICE_PORT
          value: "8003"
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: dispatch-data
---
apiVersion: v1
kind: Service
metadata:
  name: dispatch-service
  namespace: helep
spec:
  selector:
    app: dispatch-service
  ports:
  - port: 8003
    targetPort: 8003
  type: ClusterIP
