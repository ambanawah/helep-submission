apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: notification-data
  namespace: {{ .Values.global.namespace }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.global.replicaCount }}
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: {{ .Values.global.image.registry }}/{{ .Values.global.image.username }}/helep-notification-service:{{ .Values.global.image.tag }}
        ports:
        - containerPort: 8004
        env:
        - name: KAFKA_BOOTSTRAP
          value: {{ .Values.global.kafka.bootstrap }}
        - name: DB_PATH
          value: /data/notification.db
        - name: SERVICE_PORT
          value: "8004"
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: notification-data
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: notification-service
  ports:
  - port: 8004
    targetPort: 8004
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: notification-service-hpa
  namespace: {{ .Values.global.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: notification-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
