apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: analytics-data
  namespace: {{ .Values.global.namespace }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.global.replicaCount }}
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
      - name: analytics-service
        image: {{ .Values.global.image.registry }}/{{ .Values.global.image.username }}/helep-analytics-service:{{ .Values.global.image.tag }}
        ports:
        - containerPort: 8005
        env:
        - name: KAFKA_BOOTSTRAP
          value: {{ .Values.global.kafka.bootstrap }}
        - name: DB_PATH
          value: /data/analytics.db
        - name: SERVICE_PORT
          value: "8005"
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: analytics-data
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: analytics-service
  ports:
  - port: 8005
    targetPort: 8005
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: analytics-service-hpa
  namespace: {{ .Values.global.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: analytics-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
